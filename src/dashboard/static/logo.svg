      <path d="M556 384 H612"/>
    </g>
  </g>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-weight="700" font-size="132">
    <text x="512" y="650" text-anchor="middle">
