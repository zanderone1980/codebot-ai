<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeBot AI — Dashboard</title>
  <link rel="stylesheet" href="style.css?v=5">
  <link rel="icon" href="favicon.svg?v=5" type="image/svg+xml">
</head>
<body>
  <div id="app">
    <nav id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-mark">
            <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
              <!-- Antenna -->
              <line x1="18" y1="2" x2="18" y2="7" stroke="#818cf8" stroke-width="2.2" stroke-linecap="round"/>
              <circle cx="18" cy="1.8" r="2.2" fill="#a78bfa"/>
              <!-- Head — bright white so it pops on dark sidebar -->
              <rect x="5" y="8" width="26" height="22" rx="7" fill="#e0e7ff"/>
              <!-- Eyes — large, accent colored -->
              <circle cx="14" cy="18" r="4" fill="#6366f1"/>
              <circle cx="22" cy="18" r="4" fill="#6366f1"/>
              <!-- Pupils — bright white dots -->
              <circle cx="15.2" cy="17" r="1.5" fill="#fff"/>
              <circle cx="23.2" cy="17" r="1.5" fill="#fff"/>
              <!-- Mouth -->
              <rect x="13" y="25" width="10" height="2" rx="1" fill="#a5b4fc"/>
              <defs><linearGradient id="lg" x1="6" y1="9" x2="30" y2="29"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#4f46e5"/></linearGradient></defs>
            </svg>
          </div>
          <div class="logo-text">
            <span class="logo-name">CodeBot</span>
            <span class="logo-badge">AI</span>
          </div>
        </div>
      </div>

      <div class="nav-section">
        <span class="nav-section-label">Overview</span>
        <ul class="nav-links">
          <li>
            <a href="#sessions" class="nav-link active" data-section="sessions">
              <span class="nav-icon">&#x2630;</span>
              Sessions
            </a>
          </li>
          <li>
            <a href="#audit" class="nav-link" data-section="audit">
              <span class="nav-icon">&#x1F6E1;</span>
              Audit Trail
            </a>
          </li>
          <li>
            <a href="#metrics" class="nav-link" data-section="metrics">
              <span class="nav-icon">&#x2593;</span>
              Metrics
            </a>
          </li>
        </ul>
      </div>

      <div class="sidebar-footer">
        <div id="health-status" class="health-pill">
          <span class="health-dot"></span>
          <span class="health-text">Connecting...</span>
        </div>
      </div>
    </nav>

    <main id="content">
      <!-- Sessions -->
      <section id="section-sessions" class="section active">
        <div class="section-header">
          <div>
            <h1>Sessions</h1>
            <p class="section-subtitle">Browse and inspect your CodeBot conversations</p>
          </div>
          <div class="header-stats" id="session-stats"></div>
        </div>
        <div id="sessions-list" class="card-grid"></div>
        <div id="session-detail" class="detail-panel" style="display:none"></div>
      </section>

      <!-- Audit -->
      <section id="section-audit" class="section">
        <div class="section-header">
          <div>
            <h1>Audit Trail</h1>
            <p class="section-subtitle">Cryptographically verified tool execution log</p>
          </div>
          <div class="header-actions">
            <button id="btn-verify" class="btn btn-primary">
              &#x2713; Verify Chain
            </button>
            <span id="verify-result" class="verify-badge"></span>
          </div>
        </div>
        <div id="audit-timeline" class="timeline-container"></div>
      </section>

      <!-- Metrics -->
      <section id="section-metrics" class="section">
        <div class="section-header">
          <div>
            <h1>Metrics</h1>
            <p class="section-subtitle">Usage analytics and performance overview</p>
          </div>
        </div>
        <div id="metrics-cards" class="stats-grid"></div>
        <div id="usage-chart" class="chart-panel"></div>
        <div id="tool-breakdown" class="breakdown-panel"></div>
      </section>
    </main>
  </div>

  <script src="app.js?v=5"></script>
</body>
</html>
