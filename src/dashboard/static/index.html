<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeBot AI</title>
  <link rel="stylesheet" href="style.css?v=15">
  <link rel="icon" href="favicon.svg?v=15" type="image/svg+xml">
</head>
<body>
  <!-- Matrix Code Rain Canvas -->
  <canvas id="matrix-bg"></canvas>

  <!-- Main Content -->
  <div id="app">
    <!-- Connection Indicator -->
    <div id="conn-indicator">
      <span class="conn-dot"></span>
      <span class="conn-text">Connecting...</span>
    </div>

    <!-- Center Stage -->
    <div id="center-stage">
      <!-- Logo -->
      <div id="logo-area">
        <img src="logo.svg?v=15" alt="CodeBot" id="logo-img" />
        <div id="logo-tagline">AI Development Console</div>
      </div>

      <!-- Content Panels (swapped by nav) -->
      <div id="content-area">

        <!-- Chat Panel (default) -->
        <div id="panel-chat" class="panel active">
          <div id="chat-messages" class="chat-messages"></div>
          <div class="chat-input-row">
            <input type="text" id="chat-input" class="chat-input"
                   placeholder="Ask CodeBot anything..." autocomplete="off" />
            <button id="chat-send" class="btn-send">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </div>

        <!-- Sessions Panel -->
        <div id="panel-sessions" class="panel">
          <div class="panel-title-row">
            <h2>Sessions</h2>
            <div id="session-stats" class="panel-stats"></div>
          </div>
          <div id="sessions-list" class="card-grid"></div>
          <div id="session-detail" class="detail-panel" style="display:none"></div>
        </div>

        <!-- Terminal Panel -->
        <div id="panel-terminal" class="panel">
          <div class="terminal-window">
            <div class="terminal-titlebar">
              <div class="terminal-dots">
                <span class="dot dot-red"></span>
                <span class="dot dot-yellow"></span>
                <span class="dot dot-green"></span>
              </div>
              <span class="terminal-title">codebot &mdash; bash</span>
              <div class="terminal-dots-spacer"></div>
            </div>
            <div id="terminal-output" class="terminal-output"></div>
            <div class="terminal-input-row">
              <span class="terminal-prompt">$</span>
              <input type="text" id="terminal-input" class="terminal-input"
                     placeholder="Enter command..." autocomplete="off" />
            </div>
          </div>
        </div>

        <!-- Tools Panel -->
        <div id="panel-tools" class="panel">
          <div class="panel-title-row">
            <h2>Tools</h2>
          </div>
          <!-- Quick Actions -->
          <div class="quick-grid">
            <button class="quick-btn" data-action="git-status">
              <span class="quick-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"/></svg>
              </span>
              Git Status
            </button>
            <button class="quick-btn" data-action="run-tests">
              <span class="quick-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
              </span>
              Run Tests
            </button>
            <button class="quick-btn" data-action="git-log">
              <span class="quick-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              </span>
              Git Log
            </button>
            <button class="quick-btn" data-action="health-check">
              <span class="quick-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
              </span>
              Health Check
            </button>
          </div>
          <div id="quick-output" class="cmd-output"></div>
          <!-- Tool Runner -->
          <div class="tool-runner-section">
            <h3>Tool Runner</h3>
            <div class="tool-runner-row">
              <select id="tool-select" class="tool-select">
                <option value="">Select a tool...</option>
              </select>
              <button id="tool-run-btn" class="btn-action" disabled>Execute</button>
            </div>
            <div id="tool-description" class="tool-description"></div>
            <div id="tool-form" class="tool-form"></div>
            <div id="tool-result" class="cmd-output"></div>
          </div>
        </div>

        <!-- Metrics Panel -->
        <div id="panel-metrics" class="panel">
          <div class="panel-title-row">
            <h2>Metrics</h2>
          </div>
          <div id="metrics-cards" class="stats-grid"></div>
          <div id="usage-chart" class="chart-panel"></div>
          <div id="tool-breakdown" class="breakdown-panel"></div>
        </div>

      </div>
    </div>

    <!-- Bottom Nav Pills -->
    <nav id="bottom-nav">
      <button class="nav-pill active" data-panel="chat">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>Chat</span>
      </button>
      <button class="nav-pill" data-panel="sessions">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>Sessions</span>
      </button>
      <button class="nav-pill" data-panel="terminal">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
        <span>Terminal</span>
      </button>
      <button class="nav-pill" data-panel="tools">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
        <span>Tools</span>
      </button>
      <button class="nav-pill" data-panel="metrics">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
        <span>Metrics</span>
      </button>
    </nav>
  </div>

  <script src="app.js?v=15"></script>
</body>
</html>
